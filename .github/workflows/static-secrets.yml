name: 'Static Secrets'
# Docs => https://docs.akeyless.io/docs/create-secret

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**/*'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/static-secrets.yml'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Package
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Clean install, format, lint, test, and build
      run: npm ci && npm run package

    - name: Upload dist folder
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 1

  static_secret:
    needs: build
    runs-on: ubuntu-latest
    name: Fetch static
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download dist folder
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Fetch static secret from AKeyless
      id: fetch-secrets
      uses: ./
      with:
        access-id: ${{secrets.AKEYLESS_ACCESS_ID_PERSONAL}}
        static-secrets: '{"/my-first-secret":"my_static_secret"}'

    - name: Verify Job Outputs
      run: echo "Your output secret is ${{steps.fetch-secrets.outputs.my_static_secret}}"

    - name: Verify Environment Variables
      run: echo "Your environment secret is ${{env.my_static_secret}}"

    - name: Fetch static secret from AKeyless
      id: fetch-secrets2
      uses: ./
      with:
        access-id: ${{secrets.AKEYLESS_ACCESS_ID_PERSONAL}}
        static-secrets: '{"/samples/multiline-example":"my_multiline_secret_as_base64"}'
        export-secrets-as-base64: true

    - name: Verify Job Outputs
      run: |
        echo "Your output secret is ${{steps.fetch-secrets2.outputs.my_multiline_secret_as_base64}}"
        echo ${{steps.fetch-secrets2.outputs.my_multiline_secret_as_base64}} | base64 -d

    - name: Verify Environment Variables
      run: |
        echo "Your environment base64 secret is ${{env.my_multiline_secret_as_base64}}"
        echo ${{env.my_multiline_secret_as_base64}} | base64 -d