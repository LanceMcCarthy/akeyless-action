name: 'Static Secrets'
# Docs => https://docs.akeyless.io/docs/create-secret
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**/*'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/static-secrets.yml'

env:
  ALLOWED_ENDPOINTS: "github.com:443 registry.npmjs.org:443 api.akeyless.io:443 pkg.harness.io:443"

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Package
    steps:
    - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit
        allowed-endpoints: ${{env.ALLOWED_ENDPOINTS}}

    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Clean install, format, lint, test, and build
      run: npm ci && npm run package

    - name: Upload dist folder
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/
        retention-days: 1

  static_secret:
    needs: build
    runs-on: ubuntu-latest
    name: Fetch static
    steps:
    - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit
        allowed-endpoints: ${{env.ALLOWED_ENDPOINTS}}

    - name: Checkout
      uses: actions/checkout@v6

    - name: Download dist folder
      uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist/

    - name: Fetch static secret from AKeyless
      id: fetch-secrets
      uses: ./
      with:
        access-id: ${{secrets.AKEYLESS_ACCESS_ID_PERSONAL}}
        static-secrets: '{"/my-first-secret":"my_static_secret"}'

    - name: Verify Job Outputs
      run: echo "Your output secret is ${{steps.fetch-secrets.outputs.my_static_secret}}"

    - name: Verify Environment Variables
      run: echo "Your environment secret is ${{env.my_static_secret}}"
