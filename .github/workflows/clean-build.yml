name: 'Clean Build'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**/*'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build.yml'

jobs:
  static_secret:
    runs-on: ubuntu-latest
    name: Fetch static
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Clean install, format, lint, test, and build
      run: npm ci && npm run package
